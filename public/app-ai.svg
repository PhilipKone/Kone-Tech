<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Official Kones Premium Gradient -->
    <linearGradient id="ai-brand-gradient" x1="100" y1="40" x2="100" y2="165" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BC00FF" />
      <stop offset="100%" stop-color="#00D1FF" />
    </linearGradient>
    
    <!-- Sophisticated Neural Glow -->
    <filter id="ai-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- The Kones Droplet (Perfectly Aligned with Brand Path) -->
  <path d="M 100 40 C 100 40 140 85 140 125 C 140 147 122 165 100 165 C 78 165 60 147 60 125 C 60 85 100 40 100 40 Z" fill="url(#ai-brand-gradient)" />

  <!-- AI Neural Core (Re-centered and Balanced) -->
  <g filter="url(#ai-glow)">
    <circle cx="100" cy="120" r="14" fill="white" />
    
    <!-- Dynamic Neural Branching -->
    <path d="M 100 120 L 100 90" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
    <path d="M 100 120 L 125 135" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
    <path d="M 100 120 L 75 135" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9" />
    
    <!-- Satellite Nodes -->
    <circle cx="100" cy="90" r="5" fill="white" />
    <circle cx="125" cy="135" r="5" fill="white" />
    <circle cx="75" cy="135" r="5" fill="white" />
  </g>
  
  <!-- Premium Glass Reflection -->
  <path d="M 118 75 Q 128 90 128 110" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.25" />
  <path d="M 85 155 Q 100 160 115 155" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.15" />
</svg>
