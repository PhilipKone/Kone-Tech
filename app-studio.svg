<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Container: Signature Kone Lab Purple -->
  <circle cx="100" cy="100" r="95" fill="#9333ea" />
  
  <!-- Subtle inner glow to represent 'Screen/Studio' light -->
  <circle cx="100" cy="100" r="85" stroke="white" stroke-opacity="0.1" stroke-width="2" />

  <!-- Anim Studio Viewport Brackets (Evolved L7 Brackets) -->
  <g stroke="white" stroke-width="10" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top-Left Bracket -->
    <path d="M 50 70 V 50 H 70" />
    <!-- Bottom-Right Bracket -->
    <path d="M 130 150 V 130 H 150" />
  </g>

  <!-- The "Kinetic Droplet" (Play Button + Droplet Hybrid) -->
  <g transform="translate(10, 0)"> <!-- Slight offset for visual balance with the triangle -->
    <defs>
      <linearGradient id="kinetic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="white" stop-opacity="1" />
        <stop offset="100%" stop-color="white" stop-opacity="0.7" />
      </linearGradient>
      
      <filter id="motion-blur" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
        <feOffset dx="-3" dy="0" result="offsetblur" />
        <feMerge>
          <feMergeNode in="offsetblur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- The Play Triangle merged with Droplet Curve -->
    <path
      d="M 85 70 L 125 100 L 85 130 C 75 130 70 120 70 100 C 70 80 75 70 85 70 Z"
      fill="url(#kinetic-gradient)"
      filter="url(#motion-blur)"
    />
    
    <!-- Kinetic Motion Lines (Behind the droplet) -->
    <line x1="60" y1="100" x2="45" y2="100" stroke="white" stroke-width="4" stroke-linecap="round" stroke-opacity="0.4" />
    <line x1="65" y1="85" x2="55" y2="85" stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity="0.2" />
    <line x1="65" y1="115" x2="55" y2="115" stroke="white" stroke-width="3" stroke-linecap="round" stroke-opacity="0.2" />
  </g>

  <!-- Small 'Recording' Indicator Dot -->
  <circle cx="150" cy="50" r="6" fill="#ff4444">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
